# argo-cd chart values (https://argoproj.github.io/argo-helm) for non-prod
crds:
  annotations:
    argocd.argoproj.io/sync-options: Replace=true

configs:
  params:
    server.insecure: true
    exec.enabled: true

  cm:
    create: true
    url: https://deploy.polarpoint.io        # EDIT
    statusbadge.enabled: true
    exec.enabled: true
    exec.shells: bash,sh

    # oidc.config: |                          # EDIT: enable when IdP ready
    #   name: SSO
    #   issuer: https://auth.polarpoint.io/realms/main
    #   clientID: $oidc-sso:clientid
    #   clientSecret: $oidc-sso:clientsecret
    #   requestedScopes: [openid, profile, email, groups]

    resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
      jqPathExpressions:
      - .spec.data[].remoteRef.conversionStrategy
      - .spec.data[].remoteRef.decodingStrategy
      - .metadata.annotations

    resource.customizations.ignoreDifferences.PersistentVolumeClaim: |
      jqPathExpressions:
      - .spec.resources.requests.storage
      - .status.capacity.storage

  rbac:
    create: true
    scopes: "[groups]"
    policy.default: "role:readonly"
    policy.csv: |
      p, role:admin, exec, create, */* , allow
      g, polarpoint-argocd-admin, role:admin

server:
  ingress:
    enabled: false

# Expose the UI over Tailscale via the operator (foundational app), using
# the documented defaultBackend form. Device joins the tailnet as 'deploy'
# -> https://deploy.<tailnet>.ts.net
# For deploy.polarpoint.io: add a CNAME (public DNS) or a Tailscale
# split-DNS record pointing deploy.polarpoint.io at the ts.net name /
# tailnet IP of the device.
extraObjects:
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: argocd-server-tailscale
      namespace: argocd
      annotations:
        tailscale.com/hostname: deploy
    spec:
      ingressClassName: tailscale
      defaultBackend:
        service:
          name: argocd-server
          port:
            number: 80
      tls:
        - hosts:
            - deploy

controller:
  replicas: 1
  metrics:
    enabled: true

repoServer:
  replicas: 1

redis-ha:
  enabled: false

global:
  logging:
    format: text
    level: info
