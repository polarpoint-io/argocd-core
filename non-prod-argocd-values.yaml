# argo-cd chart values (https://argoproj.github.io/argo-helm) for non-prod
crds:
  annotations:
    argocd.argoproj.io/sync-options: Replace=true

configs:
  params:
    server.insecure: false   # TLS terminated by argocd-server (argocd-server-tls cert)
    exec.enabled: true

  cm:
    create: true
    url: https://deploy.polarpoint.io        # EDIT
    statusbadge.enabled: true
    exec.enabled: true
    exec.shells: bash,sh

    # oidc.config: |                          # EDIT: enable when IdP ready
    #   name: SSO
    #   issuer: https://auth.polarpoint.io/realms/main
    #   clientID: $oidc-sso:clientid
    #   clientSecret: $oidc-sso:clientsecret
    #   requestedScopes: [openid, profile, email, groups]

    resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
      jqPathExpressions:
      - .spec.data[].remoteRef.conversionStrategy
      - .spec.data[].remoteRef.decodingStrategy
      - .metadata.annotations

    resource.customizations.ignoreDifferences.PersistentVolumeClaim: |
      jqPathExpressions:
      - .spec.resources.requests.storage
      - .status.capacity.storage

  rbac:
    create: true
    scopes: "[groups]"
    policy.default: "role:readonly"
    policy.csv: |
      p, role:admin, exec, create, */* , allow
      g, polarpoint-argocd-admin, role:admin

server:
  ingress:
    enabled: false
  # Expose over Tailscale as an L4 service (raw TCP forward, device 'deploy').
  # argocd-server terminates TLS itself with the cert-manager certificate
  # argocd-server-tls (deploy.polarpoint.io, DNS-01 via Route53) - see
  # argocd-foundational-applications cert-manager-manifests.
  # DNS: deploy.polarpoint.io CNAME -> deploy.<tailnet>.ts.net
  service:
    annotations:
      tailscale.com/expose: "true"
      tailscale.com/hostname: deploy

controller:
  replicas: 1
  metrics:
    enabled: true

repoServer:
  replicas: 1

redis-ha:
  enabled: false

global:
  logging:
    format: text
    level: info
